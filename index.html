<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic defender</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="top">
    <div class="lives">Lives left: <span id="life">3</span></div>
    <div class="points">Points: <span id="point">0px</span></div>
  </div>
  <div class="game-area">
    <div class="obstacles">
      <img id="plan1" src="plan-1.jpg" alt="obstacle">
      <img id="plan2" src="plan-2.jpg" alt="obstacle">
      <img id="plan3" src="plan-3.jpg" alt="obstacle">
      <img id="plan4" src="moon.png" alt="obstacle">
      <img id="alien1" src="alien.jpg" alt="alien">
      <img id="alien2" src="alien.jpg" alt="alien">
      <img id="alien3" src="alien.jpg" alt="alien">
      <span id="bullet"></span>
    </div>
    <div class="spaceship">
      <img id="ss" src="spaceship.png" alt="Spaceship">
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
